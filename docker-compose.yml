services:
  wxocr:
    build: .
    # Or use a pre-built image instead of building locally:
    # image: golangboyme/wxocr
    container_name: wxocr
    shm_size: 256m
    ports:
      - "${PORT:-5000}:5000"
    environment:
      - WORKERS=${WORKERS:-2}
      - THREADS=${THREADS:-4}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "4"
